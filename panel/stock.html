<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个股详情页</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .info-item {
      display: flex;
      flex-direction: column;
    }
    .info-label {
      font-size: 14px;
      color: #1890ff;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .info-value {
      font-size: 16px;
      color: #333;
      line-height: 1.4;
    }
    .section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      color: #1890ff;
      margin-bottom: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    .section-title i {
      margin-right: 8px;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      background-color: #f0f5ff;
      border: 1px solid #adc6ff;
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 14px;
      color: #1890ff;
    }
    .text-content {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      background-color: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="container stock-page fade-in">
    <header class="header row-between">
      <div>
        <h1 id="stockTitle"><i class="fa-solid fa-layer-group"></i> 个股详情</h1>
        <p id="stockSubTitle"><i class="fa-solid fa-spinner fa-spin"></i> 正在加载...</p>
      </div>
      <div class="header-actions">
        <button id="editBtn" class="btn primary"><i class="fa-solid fa-edit"></i> 编辑</button>
        <a class="btn ghost" href="/"><i class="fa-solid fa-arrow-left"></i> 返回面板</a>
      </div>
    </header>
    
    <section class="panel">
      <!-- 基本信息 -->
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label"><i class="fa-solid fa-tag"></i> 名称</div>
          <div class="info-value" id="name"></div>
        </div>
        <div class="info-item">
          <div class="info-label"><i class="fa-solid fa-barcode"></i> 代码</div>
          <div class="info-value" id="code"></div>
        </div>
        <div class="info-item">
          <div class="info-label"><i class="fa-solid fa-chess-board"></i> 板块</div>
          <div class="info-value" id="board"></div>
        </div>
        <div class="info-item">
          <div class="info-label"><i class="fa-solid fa-industry"></i> 行业</div>
          <div class="info-value" id="industry"></div>
        </div>
        <div class="info-item">
          <div class="info-label"><i class="fa-solid fa-hashtag"></i> 提及次数</div>
          <div class="info-value" id="mention_count"></div>
        </div>
      </div>
      
      <!-- 概念 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-lightbulb"></i> 概念</div>
        <div id="concepts" class="tag-list"></div>
      </div>
      
      <!-- 产品 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-box-open"></i> 产品</div>
        <div id="products" class="text-content"></div>
      </div>
      
      <!-- 主营业务 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-briefcase"></i> 主营业务</div>
        <div id="core_business" class="text-content"></div>
      </div>
      
      <!-- 行业地位 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-trophy"></i> 行业地位</div>
        <div id="industry_position" class="text-content"></div>
      </div>
      
      <!-- 产业链 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-link"></i> 产业链</div>
        <div id="chain" class="text-content"></div>
      </div>
      
      <!-- 合作方 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-handshake"></i> 合作方</div>
        <div id="partners" class="text-content"></div>
      </div>
      
      <!-- 操作按钮 -->
      <div class="row-actions" style="margin-top: 30px;">
        <button id="saveBtn" class="btn primary" type="button"><i class="fa-solid fa-save"></i> 保存</button>
        <button id="reloadBtn" class="btn" type="button"><i class="fa-solid fa-rotate-right"></i> 重载</button>
        <span id="statusLine"></span>
      </div>
      
      <!-- 文章数据 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-newspaper"></i> 文章数据</div>
        <div id="articlesList"></div>
      </div>
      
      <!-- 关联查询 -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-network-wired"></i> 关联查询</div>
        <div class="query-tabs">
          <button class="query-tab active" data-tab="industry">同行业</button>
          <button class="query-tab" data-tab="concept">同概念</button>
          <button class="query-tab" data-tab="chain">产业链</button>
          <button class="query-tab" data-tab="partner">合作方</button>
        </div>
        <div class="query-results">
          <div id="industryResults" class="query-result active"></div>
          <div id="conceptResults" class="query-result"></div>
          <div id="chainResults" class="query-result"></div>
          <div id="partnerResults" class="query-result"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="/stock.js"></script>
</body>
</html>
